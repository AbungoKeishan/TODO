<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Todo App</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2>Todo Application</h2>
        <a href="/add" class="btn btn-primary">
            Add Todo
        </a>
    </div>

    <table class="table table-bordered shadow bg-white">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="todo : ${todos.content}">
            <td th:text="${todo.id}"></td>
            <td th:text="${todo.title}"></td>
            <td th:text="${todo.description}"></td>
            <td>
                <span
                        th:if="${todo.completed}"
                        class="badge bg-success">
                    Completed
                </span>
                <span
                        th:unless="${todo.completed}"
                        class="badge bg-warning">
                    Pending
                </span>
            </td>
            <td>
                <a
                        th:href="@{/edit/{id}(id=${todo.id})}"
                        class="btn btn-warning btn-sm">
                    Edit
                </a>
                <a
                        th:href="@{/delete/{id}(id=${todo.id})}"
                        class="btn btn-danger btn-sm">

                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-center mt-4">
        <nav>
            <ul class="pagination">
                <!-- Previous Button -->
                <li class="page-item"
                    th:classappend="${todos.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/
                   (page=${todos.number - 1},
                   size=${todos.size},
                   sortBy='id',
                   sortDir='asc')}">
                        Previous
                    </a>
                </li>

                <!-- Page Numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, todos.totalPages - 1)}"
                    th:classappend="${todos.number == i} ? 'active'">

                    <a class="page-link"
                       th:href="@{/
                   (page=${i},
                   size=${todos.size},
                   sortBy='id',
                   sortDir='asc')}"

                       th:text="${i + 1}">
                    </a>

                </li>

                <!-- Next Button -->
                <li class="page-item"
                    th:classappend="${todos.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/
                   (page=${todos.number + 1},
                   size=${todos.size},
                   sortBy='id',
                   sortDir='asc')}">

                        Next
                    </a>

                </li>

            </ul>

        </nav>

    </div>

</div>

</body>
</html>
